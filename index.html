<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Snack Hub</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- NAVBAR -->

  <nav class="navbar">

    <h2 class="logo">🍟 Snack Hub</h2>

    <!-- HAMBURGER -->

    <div class="hamburger"
         onclick="toggleMenu()">

      ☰

    </div>

    <!-- NAV LINKS -->

    <div class="nav-links"
         id="nav-links">

      <a href="#">Home</a>

      <a href="#menu">Menu</a>

      <a href="#contact">Contact</a>

      <div class="cart-icon"
           onclick="openCart()">

        🛒 <span id="cart-count">0</span>

      </div>

    </div>

  </nav>

  <!-- CART SIDEBAR -->

  <div class="cart-sidebar"
       id="cart-sidebar">

    <div class="cart-top">

      <h2>Your Cart 🛒</h2>

      <button onclick="closeCart()">
        X
      </button>

    </div>

    <div id="cart-items"></div>

    <h3 id="total-price">
      Total: ₹0
    </h3>

    <button class="checkout-btn"
            onclick="openCheckout()">

      Checkout

    </button>

  </div>

  <!-- HERO SECTION -->

  <header class="hero">

    <div class="overlay">

      <h1>Snack Hub 🍔</h1>

      <p>
        Fresh Snacks • Fast Delivery • Best Taste
      </p>

      <button>
        Order Now
      </button>

    </div>

  </header>

  <!-- TOP CONTROLS -->

  <section class="top-controls reveal">

    <h2 class="section-title">
      Popular Snacks
    </h2>

    <!-- SEARCH -->

    <div class="search-box">

      <input
        type="text"
        id="search-input"
        placeholder="Search snacks..."
        onkeyup="searchProducts()"
      >

    </div>

    <!-- FILTERS -->

    <div class="filters">

      <button onclick="filterProducts('All')">
        All
      </button>

      <button onclick="filterProducts('Fast Food')">
        Fast Food
      </button>

      <button onclick="filterProducts('Snacks')">
        Snacks
      </button>

      <button onclick="filterProducts('Drinks')">
        Drinks
      </button>

    </div>

  </section>

  <!-- MENU SECTION -->

  <section class="menu-section reveal"
           id="menu">

    <div class="menu"
         id="menu-container">

    </div>

  </section>

  <!-- WHY US -->

  <section class="section reveal">

    <h2 class="section-title">
      Why Choose Us
    </h2>

    <p>
      ✔ Fresh Food |
      ✔ Fast Delivery |
      ✔ Best Taste
    </p>

  </section>

  <!-- CONTACT -->

  <section class="section reveal"
           id="contact">

    <h2 class="section-title">
      Contact Us
    </h2>

    <iframe
      src="https://maps.google.com/maps?q=vijayawada&t=&z=13&ie=UTF8&iwloc=&output=embed">
    </iframe>

    <p>📞 7670901716</p>

    <p>📍 Vijayawada</p>

  </section>

  <!-- WHATSAPP -->

  <a href="https://wa.me/917670901716"
     target="_blank"
     class="whatsapp-btn">

    💬

  </a>

  <!-- CHECKOUT POPUP -->

  <div class="checkout-popup"
       id="checkout-popup">

    <div class="checkout-box">

      <h2>Order Summary 🍔</h2>

      <p id="checkout-total">
        Total: ₹0
      </p>

      <button onclick="placeOrder()">

        Place Order

      </button>

      <button onclick="closeCheckout()">

        Cancel

      </button>

    </div>

  </div>

  <!-- FOOTER -->

  <footer class="footer">

    <p>
      © 2026 Snack Hub • Made with ❤️
    </p>

  </footer>

  <script src="script.js"></script>

</body>

</html>
